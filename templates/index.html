<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="card">
            <h1>🎓 Student Performance Predictor</h1>
            <p class="subtitle">
                Predict writing performance using AI/ML.
            </p>

            <div class="input-group">
                <label>Gender</label>
                <select id="gender">
                    <option value="0">Female</option>
                    <option value="1">Male</option>
                </select>
            </div>

            <div class="input-group">
                <label>Math Score</label>
                <input type="number" id="math" placeholder="Enter math score">
            </div>

            <div class="input-group">
                <label>Reading Score</label>
                <input type="number" id="reading" placeholder="Enter reading score">
            </div>
            <button onclick="predictScore()">
                Predict Score
            </button>

            <div class="result-box" id="result">
                Prediction will appear here
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
